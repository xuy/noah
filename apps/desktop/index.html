<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' asset: https://asset.localhost data:"
    />
    <title>Noah</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      /* Dark splash (default) */
      body { background: #0f1729; }
      .light body, :root.light body { background: #f4f6fb; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f1729;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      :root.light #splash { background: #f4f6fb; }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin-bottom: 16px;
        animation: breathe 2s ease-in-out infinite;
      }
      #splash .splash-text {
        color: #8b9ab8;
        font-size: 13px;
        letter-spacing: 0.02em;
        animation: fade-in 0.6s ease 0.3s both;
      }
      :root.light #splash .splash-text { color: #3d4f6f; }
      #splash .splash-dots {
        display: inline-block;
        width: 18px;
        text-align: left;
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
    <script>
      // Apply theme before first paint to prevent flash
      (function() {
        var t = localStorage.getItem('noah-theme') || 'system';
        var isLight = t === 'light' || (t === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches);
        if (isLight) document.documentElement.classList.add('light');
      })();
    </script>
  </head>

  <body>
    <div id="splash">
      <img src="/noah-logo.svg" alt="" />
      <div class="splash-text">Getting things ready<span class="splash-dots" id="splash-dots"></span></div>
    </div>
    <div id="root"></div>
    <script>
      // Animate the dots so the user knows things are happening
      (function() {
        var el = document.getElementById('splash-dots');
        var n = 0;
        setInterval(function() {
          n = (n + 1) % 4;
          el.textContent = '...'.slice(0, n);
        }, 400);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
